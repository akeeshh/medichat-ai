# MediChat theme lock.
#
# Streamlit follows the OS prefers-color-scheme by default, so a phone in
# dark mode flipped the whole app to the dark base theme: white body text
# on our white cards (the "ghost text"), black secondary buttons, invisible
# labels. MediChat's entire design system assumes light. Locking the theme
# here overrides the OS preference on every device.

[theme]
base = "light"
primaryColor = "#6366f1"
backgroundColor = "#f6f8fc"
secondaryBackgroundColor = "#ffffff"
textColor = "#0f172a"

[server]
headless = true

[browser]
gatherUsageStats = false
